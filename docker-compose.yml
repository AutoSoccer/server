services:
  mysql:
    image: mysql:8.4
    container_name: autosoccer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auto_soccer
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -proot --silent']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
